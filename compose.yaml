services:
  db:
    container_name: RESUME_POSTGRES
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_USER: ${PG_DB_USER}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      
    volumes: 
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: RESUME_REDIS
    restart: always
    
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  qdrant:
    container_name: RESUME_QDRANT
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]

  minio:
    image: minio/minio
    container_name: RESUME_MINIO
    # command to set the fixed console port (9001) for the UI
    command: server --console-address ":9001" /data
    ports:
      - "${MINIO_CLIENT_PORT}:${MINIO_CLIENT_PORT}" # API Port
      - "${MINIO_UI_PORT}:${MINIO_UI_PORT}"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - minio_data:/data


  prometheus:
    container_name: RESUME_PROMETHEUS
    image: prom/prometheus
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]
  
  grafana:
    container_name: RESUME_GRAFANA
    image: grafana/grafana
    ports: ["3000:3000"]
  
  api:
    container_name: RESUME_API
    build: .
    depends_on: [db, redis, qdrant, minio]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${PG_DB_USER}:${PG_DB_PASSWORD}@db/${PG_DB_NAME}
  
  nginx:
    container_name: RESUME_NGINX
    image: nginx:latest
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf"]
    depends_on: [api]

volumes:
  postgres_data:
  minio_data:
  redis_data: